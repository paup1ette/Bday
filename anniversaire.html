<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joyeux anniversaire Chloé ! 🎂</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a0533;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  /* ── Confettis ── */
  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    opacity: 0;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
  }

  /* ── Scène ── */
  .scene {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* ── Titre ── */
  .title {
    font-family: 'Pacifico', cursive;
    font-size: clamp(2rem, 8vw, 3.6rem);
    color: #ffe066;
    text-shadow: 0 0 24px #ffb300aa, 0 2px 0 #a06000;
    opacity: 0;
    transform: translateY(-30px) scale(0.8);
    animation: titleIn 0.8s cubic-bezier(.34,1.56,.64,1) 0.3s forwards;
    letter-spacing: 1px;
  }
  @keyframes titleIn {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Gâteau SVG ── */
  .cake-wrap {
    opacity: 0;
    transform: scale(0.5) translateY(40px);
    animation: cakeIn 0.9s cubic-bezier(.34,1.56,.64,1) 0.9s forwards;
    filter: drop-shadow(0 8px 32px #65f6b966); /* ff6eb466 */
  }
  @keyframes cakeIn {
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Flammes */
  .flame {
    transform-origin: center bottom;
    animation: flicker 0.9s ease-in-out infinite alternate;
  }
  .flame:nth-child(2) { animation-duration: 0.7s; animation-delay: 0.15s; }
  .flame:nth-child(3) { animation-duration: 1.1s; animation-delay: 0.3s;  }
  @keyframes flicker {
    0%   { transform: scaleX(1)   scaleY(1)    rotate(-3deg); }
    100% { transform: scaleX(0.8) scaleY(1.15) rotate(3deg);  }
  }

  /* ── Sous-titre ── */
  .subtitle {
    font-size: clamp(1rem, 4vw, 1.3rem);
    color: #bef9b8; /* f9b8e4 */
    letter-spacing: 0.05em;
    opacity: 0;
    animation: fadeUp 0.7s ease 1.7s forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Bouton ── */
  .btn {
    margin-top: 6px;
    padding: 12px 32px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #56def6, #94BAF7);
    color: #1a0533;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px #5c0b7755;
    opacity: 0;
    animation: fadeUp 0.7s ease 2.1s forwards;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:hover  { transform: scale(1.06); box-shadow: 0 6px 28px #ff6eb477; }
  .btn:active { transform: scale(0.97); }

  /* ── Souffler les bougies ── */
  .blown .flame { animation: blowOut 0.4s ease forwards; }
  @keyframes blowOut {
    0%   { opacity: 1; transform: scaleY(1); }
    60%  { opacity: 0.5; transform: scaleY(1.5) scaleX(0.5); }
    100% { opacity: 0; transform: scaleY(0); }
  }
  .blown .btn { display: none; }
  .wish {
    display: none;
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.1rem, 5vw, 1.8rem);
    color: #ffe066;
    text-align: center;
    text-shadow: 0 0 16px #ffb300aa;
    animation: fadeUp 0.6s ease forwards;
    max-width: 320px;
    line-height: 1.5;
  }
  .blown .wish { display: block; }
</style>
</head>
<body>

<div class="confetti-container" id="confetti"></div>

<div class="scene">
  <h1 class="title">Joyeux Anniversaire&nbsp;! 🎉</h1>

  <!-- Gâteau SVG -->
  <div class="cake-wrap" id="cake">
    <svg width="220" height="210" viewBox="0 0 220 210" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Gâteau d'anniversaire">

      <!-- Bougies -->
      <g class="flame" id="f1">
        <ellipse cx="75"  cy="60" rx="7" ry="11" fill="#ffe066" opacity="0.95"/>
        <ellipse cx="75"  cy="64" rx="4" ry="6"  fill="#ff9900"/>
      </g>
      <g class="flame" id="f2">
        <ellipse cx="110" cy="50" rx="7" ry="11" fill="#ffe066" opacity="0.95"/>
        <ellipse cx="110" cy="54" rx="4" ry="6"  fill="#ff9900"/>
      </g>
      <g class="flame" id="f3">
        <ellipse cx="145" cy="60" rx="7" ry="11" fill="#ffe066" opacity="0.95"/>
        <ellipse cx="145" cy="64" rx="4" ry="6"  fill="#ff9900"/>
      </g>

      <!-- Mèches -->
      <rect x="73"  y="71" width="4" height="12" rx="2" fill="#5a2d00"/>
      <rect x="108" y="61" width="4" height="12" rx="2" fill="#5a2d00"/>
      <rect x="143" y="71" width="4" height="12" rx="2" fill="#5a2d00"/>

      <!-- Étage du haut -->
      <rect x="50" y="83" width="120" height="42" rx="10" fill="#55D8F2"/> /* ff6eb4 */
      <rect x="50" y="83" width="120" height="14" rx="10" fill="#9CE9F7"/>
      <!-- Glaçage qui coule -->
      <path d="M68 97 Q72 110 68 117" stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
      <path d="M100 97 Q104 112 100 120" stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
      <path d="M135 97 Q139 108 135 115" stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
      <!-- Pépites -->
      <circle cx="85"  cy="108" r="4" fill="#ffe066"/>
      <circle cx="120" cy="105" r="3" fill="#ff6eb4"/>
      <circle cx="150" cy="111" r="3.5" fill="#ffe066"/>
      <circle cx="62"  cy="112" r="3" fill="#ff9dd4"/>

      <!-- Assiette -->
      <ellipse cx="110" cy="185" rx="100" ry="14" fill="#3b1a6b" opacity="0.5"/>
      <ellipse cx="110" cy="183" rx="98"  ry="11" fill="#5c2fa0" opacity="0.6"/>

      <!-- Étage du bas -->
      <rect x="25" y="125" width="170" height="60" rx="12" fill="#558FF2"/>
      <rect x="25" y="125" width="170" height="18" rx="12" fill="#94BAF7"/>
      <!-- Glaçage qui coule -->
      <path d="M45 143 Q50 158 45 168" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6"/>
      <path d="M85 143 Q90 160 85 170" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6"/>
      <path d="M125 143 Q130 156 125 166" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6"/>
      <path d="M165 143 Q170 155 165 163" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6"/>
      <!-- Pépites -->
      <circle cx="60"  cy="158" r="4"   fill="#ffe066"/>
      <circle cx="100" cy="162" r="3.5" fill="#ff6eb4"/>
      <circle cx="140" cy="155" r="4"   fill="#b2f7ef"/>
      <circle cx="175" cy="161" r="3"   fill="#ffe066"/>
      <circle cx="38"  cy="163" r="3"   fill="#ff9dd4"/>

      
    </svg>
  </div>

  <p class="subtitle">Souffle les bougies ! 🕯️</p>
  <button class="btn" id="blowBtn" onclick="blowCandles()">Souffler 💨 </button>
  <p class="wish">✨ Que tous tes vœux<br>se réalisent&nbsp;✨</p>
</div>

<script>
  // Confettis
  const colors = ['#ffe066','#ff6eb4','#b2f7ef','#a259e6','#ff9900','#ffffff'];
  const shapes = ['border-radius:0','border-radius:50%','clip-path:polygon(50% 0%,0% 100%,100% 100%)'];
  const container = document.getElementById('confetti');

  function makeConfetti() {
    for (let i = 0; i < 80; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.cssText = `
        left: ${Math.random()*100}%;
        top: ${-Math.random()*20}%;
        background: ${colors[Math.floor(Math.random()*colors.length)]};
        width: ${6+Math.random()*10}px;
        height: ${6+Math.random()*10}px;
        ${shapes[Math.floor(Math.random()*shapes.length)]};
        animation-duration: ${2+Math.random()*3}s;
        animation-delay: ${Math.random()*2}s;
      `;
      container.appendChild(el);
    }
    setTimeout(() => container.innerHTML = '', 5500);
  }

  // Lance les confettis à l'ouverture
  window.addEventListener('load', () => setTimeout(makeConfetti, 1200));

  function blowCandles() {
    document.getElementById('cake').classList.add('blown');
    setTimeout(makeConfetti, 300);
  }
</script>
</body>
</html>
